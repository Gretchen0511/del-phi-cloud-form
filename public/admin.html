<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员查看｜心事侦探社专家咨询表</title>
  <style>
    :root{--primary:#4A5C6A;--accent:#E8876B;--bg:#F9F7F4;--card:#fff;--border:#E0DCD5;--text:#3A3740;--muted:#6B6575;--success:#5A8F7B;--danger:#C94F4F;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:12px}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
    header{background:linear-gradient(135deg,#4A5C6A,#3D4F5F 45%,#5C6E7D);color:#fff;padding:26px 18px;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.14)}
    header h1{margin:0;font-size:1.55rem} header p{margin:6px 0 0;opacity:.85;font-size:.92rem}
    .container{max-width:1100px;margin:0 auto;padding:18px 14px 50px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
    .login{max-width:560px;margin:30px auto}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.row input{flex:1;min-width:220px;padding:11px 12px;border:1.5px solid var(--border);border-radius:9px;font:inherit;background:#FDFCFA}.row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,135,107,.12)}
    button,.btn{border:0;border-radius:24px;padding:11px 20px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:6px}button:hover,.btn:hover{filter:brightness(.98);transform:translateY(-1px)}button.secondary,.btn.secondary{background:#5B6C7E}.btn.light{background:#F2EDE6;color:#4A4A4A}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .stat{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{background:#F5F1EA;border:1px solid #E7DED1;border-radius:20px;padding:7px 12px;font-size:.9rem}.muted{color:var(--muted);font-size:.9rem}.hidden{display:none!important}.error{color:var(--danger);font-weight:700}.success{color:var(--success);font-weight:700}
    .entry-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:2px solid #ECE8E0;padding-bottom:10px;margin-bottom:12px}.entry-title{font-size:1.08rem;font-weight:800;color:#3D4F5F}.entry-meta{font-size:.86rem;color:var(--muted)}
    details{border:1px solid #ECE8E0;border-radius:10px;margin:10px 0;background:#FDFCFA}summary{cursor:pointer;font-weight:800;color:#4A5C6A;padding:10px 12px}details>div{padding:0 12px 12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px}.field{background:#fff;border:1px solid #EEE9E2;border-radius:8px;padding:8px}.field b{display:block;font-size:.78rem;color:var(--muted);margin-bottom:3px}.field span{white-space:pre-wrap}
    table{width:100%;border-collapse:collapse;font-size:.85rem;background:#fff;margin:8px 0}th,td{border:1px solid #E8E4DD;padding:7px 6px;text-align:left;vertical-align:top}th{background:#F0ECE5;color:#4A4A4A}.score{font-weight:800;color:var(--accent);white-space:nowrap}.suggestion{color:#555;white-space:pre-wrap}.empty{padding:28px;text-align:center;color:var(--muted)}
    @media(max-width:760px){table{display:block;overflow-x:auto;white-space:nowrap}.toolbar{align-items:stretch}.toolbar>*{width:100%;justify-content:center}.row button{width:100%;justify-content:center}}
  </style>
</head>
<body>
<header><h1>🔐 管理员查看页面</h1><p>《心事侦探社》第一轮专家咨询表提交数据</p></header>
<div class="container">
  <section class="card login" id="loginCard">
    <h2 style="margin-top:0">输入管理员密码</h2>
    <p class="muted">请输入 Render 里设置的 ADMIN_TOKEN。密码只会保存在本机浏览器中，方便下次查看。</p>
    <div class="row"><input id="tokenInput" type="password" placeholder="请输入管理员密码"><button id="loginBtn">查看数据</button></div>
    <p id="loginMsg" class="error"></p>
  </section>

  <section class="card hidden" id="dashboard">
    <div class="toolbar">
      <div><h2 style="margin:0">提交数据概览</h2><div class="stat"><span class="pill" id="countPill">提交人数：0</span><span class="pill" id="timePill">最近提交：-</span></div></div>
      <div class="row"><a class="btn" id="downloadCsv" href="#">下载原始 CSV</a><button class="secondary" id="refreshBtn">刷新</button><button class="light" id="logoutBtn">退出</button></div>
    </div>
  </section>

  <div id="list"></div>
</div>
<script>
const $=s=>document.querySelector(s);const tokenInput=$('#tokenInput');const loginCard=$('#loginCard');const dashboard=$('#dashboard');const list=$('#list');const loginMsg=$('#loginMsg');
const safe=v=>String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const fmtTime=t=>{try{return new Date(t).toLocaleString('zh-CN',{hour12:false})}catch{return t||''}};
const yesNo=v=>v===true?'是':v===false?'否':(v||'');
function field(label,value){return `<div class="field"><b>${safe(label)}</b><span>${safe(value||'未填写')}</span></div>`}
function scoreTable(rows, headers){ if(!rows||!rows.length) return '<p class="muted">暂无数据</p>'; return `<table><thead><tr>${headers.map(h=>`<th>${safe(h[0])}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${headers.map(h=>`<td class="${h[2]||''}">${safe(typeof h[1]==='function'?h[1](r):r[h[1]])}</td>`).join('')}</tr>`).join('')}</tbody></table>` }
function renderResponse(r){ const p=r.payload||{}; const basic=`<div class="grid">${[
  field('姓名',p.name||r.expert_name),field('性别',p.gender),field('年龄',p.age),field('最高学历',p.highest_degree),field('职称／职务',p.title),field('所在单位',p.institution||r.expert_org),field('专业背景',p.professional_background),field('相关年限',p.work_years),field('大学生心理健康课程教学经验',yesNo(p.has_teaching_experience)),field('团体辅导或心理活动带领经验',yesNo(p.has_group_experience)),field('大学生心理咨询经验',yesNo(p.has_counseling_experience)),field('心理健康教育熟悉程度',p.familiarity_mental_health?`${p.familiarity_mental_health}分`:''),field('桌游/体验式教学熟悉程度',p.familiarity_board_game?`${p.familiarity_board_game}分`:''),field('判断主要依据',p.judgment_basis)
].join('')}</div>`;
 const mechRows=(p.mechanism_scores||[]).map(x=>({item:x.item||x.dimension,score:x.score,suggestion:x.suggestion||''}));
 const overallRows=(p.overall_scores||[]).map(x=>({item:x.dimension||x.item,score:x.score,suggestion:x.suggestion||''}));
 const openRows=[['游戏机制最主要优点',p.mechanism_main_advantage],['游戏机制最需要改进',p.mechanism_improvement],['课堂/团辅可能风险',p.mechanism_risk],['规则增删建议',p.mechanism_rule_change],['情绪词删除/合并建议',p.emotion_delete_merge],['建议增加的情绪词',p.emotion_add],['情绪分类调整意见',p.emotion_category_adjust],['需求词删除/合并建议',p.need_delete_merge],['建议增加的需求词',p.need_add],['需求分类调整意见',p.need_category_adjust],['最有价值的设计',p.open_opinion_1],['目前最需要改进',p.open_opinion_2],['实际使用风险/注意事项',p.open_opinion_3],['后续修订或试玩建议',p.open_opinion_4],['是否进入下一步',p.final_decision],['原因或建议',p.final_reason]];
 return `<section class="card"><div class="entry-head"><div><div class="entry-title">${safe(p.name||r.expert_name||'未填写姓名')}</div><div class="entry-meta">${safe(p.institution||r.expert_org||'未填写单位')}</div></div><div class="entry-meta">编号 #${safe(r.id)}<br>提交时间：${safe(fmtTime(r.created_at))}</div></div>
 <details open><summary>专家基本信息</summary><div>${basic}</div></details>
 <details><summary>游戏机制评选</summary><div>${scoreTable(mechRows,[['评价维度','item'],['评分','score','score'],['修改建议','suggestion','suggestion']])}</div></details>
 <details><summary>情绪词库评审</summary><div>${scoreTable(p.emotion_scores||[],[['类别','category'],['情绪词','word'],['大学生常见性','commonality','score'],['表达清晰性','clarity','score'],['区分度','differentiation','score'],['游戏适用性','game_applicability','score'],['修改建议','suggestion','suggestion']])}</div></details>
 <details><summary>需求词库评审</summary><div>${scoreTable(p.need_scores||[],[['类别','category'],['需求词','word'],['理论适切性','theoretical_fit','score'],['学生可理解性','understandability','score'],['情境适配性','situation_fit','score'],['游戏适用性','game_applicability','score'],['修改建议','suggestion','suggestion']])}</div></details>
 <details><summary>整体评价</summary><div>${scoreTable(overallRows,[['评价维度','item'],['评分','score','score'],['修改建议','suggestion','suggestion']])}</div></details>
 <details><summary>总体意见与开放性意见</summary><div>${scoreTable(openRows.map(x=>({q:x[0],a:x[1]})),[['问题','q'],['回答','a','suggestion']])}</div></details>
 </section>`}
async function loadData(){ const token=tokenInput.value.trim()||localStorage.getItem('delphi_admin_token')||''; if(!token){loginMsg.textContent='请输入管理员密码';return} loginMsg.textContent=''; try{ const res=await fetch('/api/responses?token='+encodeURIComponent(token)); const data=await res.json(); if(!res.ok||!data.ok) throw new Error(data.error||'密码错误或无法读取数据'); localStorage.setItem('delphi_admin_token',token); loginCard.classList.add('hidden'); dashboard.classList.remove('hidden'); $('#downloadCsv').href='/api/responses.csv?token='+encodeURIComponent(token); $('#countPill').textContent='提交人数：'+(data.count||0); $('#timePill').textContent='最近提交：'+(data.rows&&data.rows[0]?fmtTime(data.rows[0].created_at):'-'); list.innerHTML=(data.rows||[]).length?(data.rows||[]).map(renderResponse).join(''):'<section class="card empty">目前还没有提交记录。</section>'; }catch(err){ loginMsg.textContent=err.message; list.innerHTML=''; dashboard.classList.add('hidden'); loginCard.classList.remove('hidden'); }}
$('#loginBtn').addEventListener('click',loadData);$('#refreshBtn').addEventListener('click',loadData);$('#logoutBtn').addEventListener('click',()=>{localStorage.removeItem('delphi_admin_token');tokenInput.value='';dashboard.classList.add('hidden');loginCard.classList.remove('hidden');list.innerHTML='';});tokenInput.addEventListener('keydown',e=>{if(e.key==='Enter')loadData()});
const saved=localStorage.getItem('delphi_admin_token'); if(saved){tokenInput.value=saved; loadData();}
</script>
</body>
</html>
